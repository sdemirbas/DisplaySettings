name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build archive
        run: |
          xcodebuild \
            -scheme Nit \
            -configuration Release \
            -archivePath ./build/Nit.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Create DMG
        run: |
          mkdir -p build/dmg-staging
          cp -R build/Nit.xcarchive/Products/Applications/Nit.app build/dmg-staging/
          hdiutil create \
            -volname "Nit" \
            -srcfolder build/dmg-staging \
            -ov -format UDZO \
            build/Nit.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nit-macOS
          path: build/Nit.dmg

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow pystray

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name Nit windows/nit.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nit-Windows
          path: dist/Nit.exe

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Nit-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Nit-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Nit.dmg
            Nit.exe
          generate_release_notes: true
