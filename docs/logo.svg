<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- top shine -->
  <rect width="512" height="256" rx="112" ry="112" fill="url(#shine)" clip-path="url(#round)"/>

  <!-- sun rays (8, rotated 22.5°) -->
  <g transform="translate(256,256)" stroke="#f5a623" stroke-linecap="round">
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22"/>
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22" transform="rotate(45)"/>
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22" transform="rotate(90)"/>
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22" transform="rotate(135)"/>
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22" transform="rotate(180)"/>
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22" transform="rotate(225)"/>
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22" transform="rotate(270)"/>
    <line x1="0" y1="-128" x2="0" y2="-168" stroke-width="22" transform="rotate(315)"/>
  </g>

  <!-- core circle -->
  <circle cx="256" cy="256" r="96" fill="#f5a623"/>

  <!-- highlight on core -->
  <ellipse cx="232" cy="228" rx="36" ry="28" fill="#ffd97a" opacity="0.55"/>
</svg>
